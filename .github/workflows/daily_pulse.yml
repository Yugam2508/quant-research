name: daily market pulse

on:
  schedule:
    - cron: '5 10 * * 1-5'   # 6:05pm SGT, weekdays
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run daily pulse
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python runs/daily_pulse.py

      - name: commit report + data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/daily/ docs/data.json
          git diff --staged --quiet || git commit -m "report: daily pulse $(date +%Y-%m-%d)"
          git push
