name: daily market pulse

on:
  schedule:
    # 10:05 UTC = 6:05pm SGT, weekdays
    - cron: '5 10 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the report back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run daily pulse
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python runs/daily_pulse.py

      - name: commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/daily/
          git diff --staged --quiet || git commit -m "report: daily pulse $(date +%Y-%m-%d)"
          git push
