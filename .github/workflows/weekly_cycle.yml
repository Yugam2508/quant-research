name: weekly-rebalance

on:
  schedule:
    - cron: "30 3 * * 1"    # Mondays 03:30 UTC = 09:00 IST
  workflow_dispatch: {}      # adds a manual "Run workflow" button

permissions:
  contents: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ccxt pandas

      - name: Run weekly cycle (paper / demo trading)
        working-directory: execution
        env:
          BINANCE_KEY: ${{ secrets.BINANCE_KEY }}
          BINANCE_SECRET: ${{ secrets.BINANCE_SECRET }}
        run: python run_cycle.py

      - name: Build report page
        working-directory: execution
        env:
          BINANCE_KEY: ${{ secrets.BINANCE_KEY }}
          BINANCE_SECRET: ${{ secrets.BINANCE_SECRET }}
        run: python report.py

      - name: Commit journal and report
        run: |
          git config user.name "cycle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add execution/journal.db docs/live.html
          git commit -m "weekly cycle $(date -u +%F)" || echo "nothing new"
          git push
